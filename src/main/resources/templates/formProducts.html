<div class="container"
     xmlns:sec="https://www.thymeleaf.org/thymeleaf-extras-springsecurity6"
     xmlns:th="http://www.thymeleaf.org"
     xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
     layout:decorate="layout1"
     layout:fragment="content"
>
  <form th:action="@{/save}" method="post" th:object="${product}">
    <input type="hidden" th:field="*{id}">
    <div class="mb-3">
      <label >Name</label>
      <input type="text" th:field="*{name}" class="form-control">
      <div class="text-danger" th:errors="*{name}"></div>
    </div>

    <div class="mb-3">
      <label >Price</label>
      <input type="text" th:field="*{price}" class="form-control">
      <div class="text-danger" th:errors="*{price}"></div>
    </div>

    <div class="mb-3">
      <label >Quantity</label>
      <input type="number" th:field="*{quantity}" class="form-control">
      <div class="text-danger" th:errors="*{quantity}"></div>
    </div>

    <button class="btn btn-success"> Save</button>
  </form>

</div>
